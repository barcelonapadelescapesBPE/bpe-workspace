  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyALaQGNQtH55u_G70fCCafC3y-QCbQyAuQ",
      authDomain: "bpe-workspace.firebaseapp.com",
      projectId: "bpe-workspace",
      storageBucket: "bpe-workspace.firebasestorage.app",
      messagingSenderId: "62900800474",
      appId: "1:62900800474:web:22dceceba0b96adb91cee3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Expose Firebase functions globally for the React app
    window._fbDb = db;
    window._fbDoc = doc;
    window._fbGet = getDoc;
    window._fbSet = (ref, data) => setDoc(ref, data, { merge: true });
    window._fbListen = (callback) => {
      return onSnapshot(doc(db, "workspace", "data"), (snap) => {
        if (snap.exists()) callback(snap.data());
      });
    };
    window._fbReady = true;

    document.getElementById('sp-status').textContent = 'Cargando app...';

    // Signal React app that Firebase is ready
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

// ─── Helpers ─────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];
const getCurrentWeekKey = () => {
  const d = new Date(); const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d); mon.setDate(diff);
  return mon.toISOString().split("T")[0];
};
const getWeekLabel = (wk) => {
  const mon = new Date(wk + "T00:00:00"); const sun = new Date(mon); sun.setDate(sun.getDate() + 6);
  const f = d => d.toLocaleDateString("es-ES", { day: "numeric", month: "short" });
  return `${f(mon)} – ${f(sun)}`;
};
const fmtDate = (str) => !str ? "" : new Date(str + "T00:00:00").toLocaleDateString("es-ES", { day: "numeric", month: "short" });
const isOverdue = (d) => !!d && d < todayStr();
const genId = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const STORAGE_KEY = "bpe-standalone-v2";

// ─── Storage ──────────────────────────────────────────────────────────────────
const defaultData = () => ({ weekTasks:{}, futureTasks:[], notes:[], completedTasks:[], events:[], docs:[], clients:[], expenses:[] });
const loadData = async () => {
  try {
    const doc = await window._fbGet(window._fbDoc(window._fbDb, "workspace", "data"));
    if (doc.exists()) return { ...defaultData(), ...doc.data() };
  } catch(_){}
  return defaultData();
};
const saveData = async (d) => { try { await window._fbSet(window._fbDoc(window._fbDb, "workspace", "data"), d); } catch(_){} };

    {children}
  </button>
);

function TaskRow({ task, onToggle, onDelete, onPromote }) {
  const overdue = !task.done && isOverdue(task.deadline);
  const high = task.priority === "high";
  const bg = task.done ? "#fff" : high ? "#FFF8EE" : "#fff";
  const border = task.done ? "1px solid #E8DFD0" : high ? "1.5px solid #C8960A" : "1px solid #E8DFD0";
  return (
    <div className="taskrow" style={{ display:"flex", alignItems:"flex-start", gap:6, padding:"8px 12px", background:bg, borderRadius:10, border, transition:"all .15s", opacity: task.done ? 0.55 : 1, position:"relative" }}>
      {high && !task.done && <div style={{ position:"absolute", top:0, left:0, width:3, height:"100%", background:"#C8960A", borderRadius:"10px 0 0 10px" }}/>}
      <button style={{ width:20, height:20, borderRadius:"50%", border:`1.5px solid ${task.done?"#0A3F6A":high?"#C8960A":"#C8B898"}`, background: task.done?"#0A3F6A":"transparent", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, color:"#F5F0E8", marginTop:2, transition:"all .15s" }} onClick={onToggle}>
        {task.done && <Ico n="check" s={10}/>}
      </button>
      <div style={{ flex:1 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          {high && !task.done && <span style={{ fontSize:9, fontWeight:800, color:"#C8960A", textTransform:"uppercase", letterSpacing:"0.08em", background:"#FFF0D0", padding:"1px 6px", borderRadius:4 }}>● Alta</span>}
          <span style={{ fontSize:14, color: task.done?"#b8a888":high?"#7a5a00":"#1A1A1A", textDecoration: task.done?"line-through":"none", lineHeight:1.4, fontWeight: high&&!task.done ? 600 : 400 }}>{task.text}</span>
        </div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop: task.deadline||task.rolledFrom ? 4 : 0 }}>
          {task.deadline && !task.done && (overdue
            ? <span style={{ display:"inline-flex", alignItems:"center", gap:3, background:"#FFF0E0", color:"#C8600A", fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:4, letterSpacing:"0.05em" }}><Ico n="warn" s={9}/> Vencida · {fmtDate(task.deadline)}</span>
            : <span style={{ display:"inline-flex", alignItems:"center", gap:3, background:"#EEF5FF", color:"#1B8FD4", fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:4, letterSpacing:"0.05em" }}><Ico n="clock" s={9}/> {fmtDate(task.deadline)}</span>
          )}
          {task.rolledFrom && <span style={{ background:"#F5F0E8", color:"#b8a888", fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:4, textTransform:"uppercase", letterSpacing:"0.05em" }}>Semana anterior</span>}
        </div>
      </div>
      <div className="taskrow-actions" style={{ opacity:0, display:"flex", gap:4, transition:"opacity .15s", flexShrink:0 }}>
        {onPromote && <GhostBtn title="Mover a esta semana" onClick={onPromote}><Ico n="arrow" s={13}/></GhostBtn>}
        <GhostBtn onClick={onDelete}><Ico n="trash" s={13}/></GhostBtn>
      </div>
    </div>
  );
}
